name: Publish

"on":
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Docs build
        run: pnpm run docs:build

      - name: Static eval
        run: pnpm run eval:static

      - name: Package smoke
        run: pnpm run release:package-smoke

      # Publishing is intentionally paused. Re-enable when the registry decision is ready.
      # For npm provenance, add `id-token: write` to this job's permissions.
      # For GitHub Packages, add `packages: write` and setup-node with
      # `registry-url: "https://npm.pkg.github.com"` and an npm scope.
      #
      # - name: Publish packages to npm
      #   run: pnpm -r --filter './packages/*' publish --access public --no-git-checks --provenance
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      #
      # - name: Publish packages to GitHub Packages
      #   run: pnpm -r --filter './packages/*' publish --no-git-checks
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
