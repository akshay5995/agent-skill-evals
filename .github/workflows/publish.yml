name: Publish

"on":
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Docs build
        run: pnpm run docs:build

      - name: Static eval
        run: pnpm run eval:static

      - name: Package smoke
        run: pnpm run release:package-smoke

      - name: Use npm 11
        run: npm install -g npm@11

      - name: Stage package on npm
        working-directory: packages/promptfoo
        run: npm stage publish --access public
