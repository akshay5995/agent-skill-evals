- description: real agent fixes login redirect locally
  vars:
    skill: bugfix-workflow
    kind: positive
    fixture: ./fixtures/login-bug
    prompt: "Fix the login redirect bug. It should send users to /dashboard."
    preconditions:
      - verifier.fails:
          run: ./verify_login_redirect.sh
    should:
      - verifier.succeeds:
          run: ./verify_login_redirect.sh
      - file.contains:
          path: app.js
          text: /dashboard
      - tool.called:
          tool: Edit
          args_match:
            path: app.js
    should_not:
      - file.changes_outside_scope:
          scope:
            - app.js
  assert:
    - type: javascript
      metric: skill.test
      value: file://./agent-skill-evals/assertions.js
      config:
        metric: skill.test
