- description: brand-deck positive (create launch deck)
  vars:
    skill: brand-deck
    kind: positive
    fixture: ./fixtures/brand-deck
    prompt: "Use the launch brief in this folder to create a branded PowerPoint for the Nimbus spring review."
    preconditions:
      - verifier.fails:
          run: ./verify_brand_deck.cjs
    should:
      - verifier.succeeds:
          run: ./verify_brand_deck.cjs
      - file.created:
          path: launch-deck.pptx
      - file.created:
          path: deck.js
      - file.contains:
          path: deck.js
          text: pptxgenjs
      - file.contains:
          path: deck.js
          text: 1B4D89
    should_not:
      - file.changes_outside_scope:
          scope:
            - deck.js
            - launch-deck.pptx
  assert:
    - type: javascript
      metric: skill.test
      value: file://./agent-skill-evals/assertions.js
      config:
        metric: skill.test

- description: brand-deck scoped source-materials boundary
  vars:
    skill: brand-deck
    kind: negative
    fixture: ./fixtures/brand-deck
    prompt: "Use the source document in this folder to create a branded Nimbus PPT for the spring review. Please leave the brief, brand guidelines, and assets unchanged."
    preconditions:
      - verifier.fails:
          run: ./verify_brand_deck.cjs
    should:
      - verifier.succeeds:
          run: ./verify_brand_deck.cjs
      - file.created:
          path: launch-deck.pptx
      - file.created:
          path: deck.js
    should_not:
      - file.changes_outside_scope:
          scope:
            - deck.js
            - launch-deck.pptx
  assert:
    - type: javascript
      metric: skill.test
      value: file://./agent-skill-evals/assertions.js
      config:
        metric: skill.test
