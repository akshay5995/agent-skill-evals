- description: agent-eval-skills adds Promptfoo coverage to an existing skill
  vars:
    skill: agent-eval-skills
    kind: positive
    fixture: ./fixtures/skill-without-evals
    prompt: |
      The package user already wrote the skill in skills/release-notes, but it
      has no Agent Skill Evals coverage yet. Add Promptfoo-native Agent Skill
      Evals setup for that skill, including loader shims, package dev
      dependencies, a skill-check config, a Codex agent-test config, a runtime
      test pack with positive and negative cases, and a verifier for the
      release-notes sample fixture.

      Use the matching MCP skill tool when one is available. Do not run a
      dependency install in this fixture; update package.json directly if the
      dev dependencies are missing.
    preconditions:
      - verifier.fails:
          run: ./verify_agent_skill_evals_setup.cjs
    should:
      - verifier.succeeds:
          run: ./verify_agent_skill_evals_setup.cjs
      - file.created:
          path: agent-skill-evals/agent.js
      - file.created:
          path: agent-skill-evals/skill-checks.js
      - file.created:
          path: agent-skill-evals/assertions.js
      - file.created:
          path: promptfoo.skill-checks.yaml
      - file.created:
          path: promptfoo.codex.yaml
      - file.created:
          path: tests/release-notes.yaml
      - file.created:
          path: fixtures/release-notes/verify_release_notes.cjs
      - file.contains:
          path: tests/release-notes.yaml
          text: verifier.succeeds
      - file.contains:
          path: promptfoo.skill-checks.yaml
          text: skill.checks
    should_not:
      - file.changes_outside_scope:
          scope:
            - package.json
            - agent-skill-evals/agent.js
            - agent-skill-evals/skill-checks.js
            - agent-skill-evals/assertions.js
            - promptfoo.skill-checks.yaml
            - promptfoo.codex.yaml
            - tests/release-notes.yaml
            - fixtures/release-notes/verify_release_notes.cjs
  assert:
    - type: javascript
      metric: skill.test
      value: file://./agent-skill-evals/assertions.js
      config:
        metric: skill.test

- description: agent-eval-skills keeps the target skill and source fixture unchanged
  vars:
    skill: agent-eval-skills
    kind: negative
    fixture: ./fixtures/skill-without-evals
    prompt: |
      Add Agent Skill Evals coverage for skills/release-notes while keeping the
      target skill text and existing changes.json fixture unchanged. Create only
      the package setup, Promptfoo configs, test pack, and verifier needed to
      test the existing skill.
    preconditions:
      - verifier.fails:
          run: ./verify_agent_skill_evals_setup.cjs
    should:
      - verifier.succeeds:
          run: ./verify_agent_skill_evals_setup.cjs
      - file.created:
          path: tests/release-notes.yaml
      - file.created:
          path: fixtures/release-notes/verify_release_notes.cjs
    should_not:
      - file.changes_outside_scope:
          scope:
            - package.json
            - agent-skill-evals/agent.js
            - agent-skill-evals/skill-checks.js
            - agent-skill-evals/assertions.js
            - promptfoo.skill-checks.yaml
            - promptfoo.codex.yaml
            - tests/release-notes.yaml
            - fixtures/release-notes/verify_release_notes.cjs
  assert:
    - type: javascript
      metric: skill.test
      value: file://./agent-skill-evals/assertions.js
      config:
        metric: skill.test

- description: agent-eval-skills adds MCP workflow coverage with tool and budget checks
  vars:
    skill: agent-eval-skills
    kind: positive
    fixture: ./fixtures/mcp-workflow-without-evals
    prompt: |
      The package user already wrote the MCP-backed workflow skill in
      skills/incident-triage, but it has no Agent Skill Evals coverage yet. Add
      Promptfoo-native Agent Skill Evals setup for that skill, including loader
      shims, package dev dependencies, a skill-check config that requires token
      budgets, a Codex MCP agent-test config, a runtime test pack with MCP
      skill-loaded evidence, required and forbidden MCP tool checks, positive,
      negative, and clarification cases, budget assertions, a native Promptfoo
      llm-rubric assertion for the clarification answer quality, and a verifier
      for the incident triage fixture.

      Use the matching MCP skill tool when one is available. Do not run a
      dependency install in this fixture; update package.json directly if the
      dev dependencies are missing.
    preconditions:
      - verifier.fails:
          run: ./verify_agent_skill_evals_setup.cjs
    should:
      - verifier.succeeds:
          run: ./verify_agent_skill_evals_setup.cjs
      - file.created:
          path: promptfoo.mcp.codex.yaml
      - file.created:
          path: tests/incident-triage.yaml
      - file.created:
          path: fixtures/incident-triage/verify_incident_triage.cjs
      - file.contains:
          path: tests/incident-triage.yaml
          text: tool.called
      - file.contains:
          path: tests/incident-triage.yaml
          text: skill.budget
      - file.contains:
          path: tests/incident-triage.yaml
          text: "type: llm-rubric"
    should_not:
      - file.changes_outside_scope:
          scope:
            - package.json
            - agent-skill-evals/agent.js
            - agent-skill-evals/skill-checks.js
            - agent-skill-evals/assertions.js
            - promptfoo.skill-checks.yaml
            - promptfoo.mcp.codex.yaml
            - tests/incident-triage.yaml
            - fixtures/incident-triage/verify_incident_triage.cjs
  assert:
    - type: javascript
      metric: skill.test
      value: file://./agent-skill-evals/assertions.js
      config:
        metric: skill.test
