description: Agent Skill Evals real-agent examples (Pi)

# Run from the examples/ directory with the Pi CLI installed and authenticated.
# The provider expects JSON-mode output.

prompts:
  - "{{prompt}}"

providers:
  - id: file://./agent-skill-evals/agent.js
    label: pi-real-agent
    config:
      adapter: pi-json
      command: pi
      args:
        - --mode
        - json
      timeoutMs: 300000

defaultTest:
  options:
    runSerially: true

tests:
  - file://tests/real-agent-brand-deck.yaml
  - file://tests/real-agent-bugfix.yaml
