description: Agent Skill Evals MCP skill loading example (Codex)

# Codex noninteractive runs currently do not reliably choose MCP tools from
# route metadata alone. This example keeps the task human, but adds a small
# Codex-only hint in the test prompt so the eval can capture MCP evidence.

prompts:
  - "{{prompt}}"

providers:
  - id: file://./agent-skill-evals/agent.js
    label: codex-mcp-skill-agent
    config:
      adapter: codex-json
      command: codex
      args:
        - --ask-for-approval
        - never
        - --sandbox
        - read-only
        - exec
        - --json
        - --skip-git-repo-check
        - --ephemeral
        - --ignore-user-config
        - --ignore-rules
        - -c
        - mcp_servers.agent_skill_evals.url="${AGENT_SKILL_EVALS_MCP_URL}"
        - -c
        - mcp_servers.agent_skill_evals.required=true
        - "-"
      timeoutMs: 300000

defaultTest:
  options:
    runSerially: true

tests:
  - file://tests/mcp-skill-loading-codex.yaml
