description: Agent Skill Evals MCP skill loading example

# Run `pnpm --filter @agent-skill-evals/examples mcp:setup` first. The eval script starts
# a local Python FastMCP HTTP server and passes its URL through AGENT_SKILL_EVALS_MCP_URL.

prompts:
  - "{{prompt}}"

providers:
  - id: file://./agent-skill-evals/agent.js
    label: claude-mcp-skill-agent
    config:
      adapter: claude-code-json
      command: claude
      args:
        - -p
        - --permission-mode
        - bypassPermissions
        - --output-format
        - stream-json
        - --verbose
        - --mcp-config
        - ./mcp/claude-http.mcp.json
        - --strict-mcp-config
      timeoutMs: 300000

defaultTest:
  options:
    runSerially: true

tests:
  - file://tests/mcp-skill-loading.yaml
